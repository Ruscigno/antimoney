services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: antimoney
      POSTGRES_USER: antimoney
      POSTGRES_PASSWORD: antimoney_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U antimoney" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://antimoney:antimoney_dev@db:5432/antimoney?sslmode=disable
      PORT: "8000"
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
