services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: antimoney
      POSTGRES_USER: antimoney
      POSTGRES_PASSWORD: antimoney_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U antimoney" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://antimoney:antimoney_dev@db:5432/antimoney?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      PORT: "8000"
      ENVIRONMENT: development
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:8000,http://127.0.0.1:5173"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
